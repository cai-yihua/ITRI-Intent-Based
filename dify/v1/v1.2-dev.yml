          text: "請閱讀以下文本：\n\n{{#sys.query#}}\n\n以下為目前「意圖列表」與其範圍：\n\n「查看UE的Throughput」：\n\
            透過下列 API 查詢並過濾回傳資料，以檢視特定 UE（或一群 UE）的連線狀態、訊號品質、Throughput 等相關統計資訊。\n例如：取得並篩選特定\
            \ UE 的吞吐量、連線狀態與訊號品質等。\n\n「查詢 Cell 裡面的 SINR Map」：\n針對指定之 Cell，查詢該 Cell\
            \ 中 的 SINR（Signal-to-Interference-plus-Noise Ratio）指標，\n並可擴及 SINR 的分佈情形或視覺化資訊（如\
            \ SINR Map）。\n例如：想了解特定 Cell 或範圍內 的 SINR 分佈、請求提供或檢視某 Cell 中 SINR Map 的詳細資訊等。\n\
            \n請根據上述定義，判斷文本是否符合任一意圖：\n\n若符合任一意圖，請以 JSON 格式回傳，包含以下欄位：\n{\n  \"intent\"\
            : \"對應的意圖名稱\",\n  \"reason\": \"判斷該意圖的原因\"\n}\n\n若文本與列表中所有意圖皆不符合，請回傳：\n\
            {\n  \"intent\": \"NONE\",\n  \"reason\": \"無法對應至任何已知意圖\"\n}\n\n請勿包含任何其他文字或解釋。\n"
