    - data:
        code: "import requests\nimport base64\nfrom typing import Any, Dict, Union\n\
          \ndef main(base_url: str, path: str) -> Dict[str, Union[bool, str, dict,\
          \ None]]:\n    \"\"\"\n    從指定路徑抓取內容，若是圖片則回傳 Base64 字串，\n    若是 JSON 或其他非圖片格式，則嘗試以\
          \ JSON 解析，\n    若解析失敗，則直接回傳原始文字內容。\n    \n    參數:\n        base_url (str):\
          \ 主機或 API 的基底網址\n        path (str): 具體路徑 (可能取得圖片或 JSON)\n\n    回傳:\n  \
          \      {\n            \"is_image\": bool,\n            \"content\": str\
          \ 或 dict 或 None\n        }\n    \"\"\"\n    url = f\"{base_url}{path}\"\n\
          \    response = requests.get(url)\n\n    if response.status_code == 200:\n\
          \        # 嘗試根據 Content-Type 判斷是否為圖片\n        content_type = response.headers.get(\"\
          Content-Type\", \"\").lower()\n        \n        if \"image\" in content_type:\n\
          \            # 以 Base64 形式回傳圖片內容\n            base64_str = base64.b64encode(response.content).decode(\"\
          utf-8\")\n            return {\n        \n                \"is_image\":\
          \ \"true\",\n                \"content\": base64_str\n                 \
          \  } \n        else:\n            # 嘗試以 JSON 解析\n            try:\n    \
          \            json_data = response.json()\n                return {\n   \
          \          \n                    \"is_image\": \"false\",\n            \
          \        \"content\": str(json_data)\n                      }\n        \
          \    except ValueError:\n                # 如果不是 JSON，就以文字回傳\n          \
          \      return {\n          \n                    \"is_image\": False,\n\
          \                    \"content\": response.text\n                }\n   \
          \ else:\n        # 若非 200，回傳 None 或其他錯誤資訊\n        return {\n\n        \
          \    \"is_image\": \"\",\n            \"content\": \"\"\n            \n\
          \        }\n"
